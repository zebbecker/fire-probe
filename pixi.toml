[workspace]
name = "fire-probe"
version = "0.1.0"
description = "Monitor OGC Features API for wildland fire perimeter data availability"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.12"
requests = ">=2.32"
pytest = ">=8.0"
ruff = ">=0.8"

[feature.dev.dependencies]
ipykernel = "*"
pandas = "*"
geopandas = "*"


[tasks]
probe = "python probe.py"
pytest = {cmd = "pytest", env = {PYTHONPATH = "."}}
lint = "ruff check ."
format = "ruff format ."

[environments]
dev = ["dev"]