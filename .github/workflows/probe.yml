name: Probe

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: probe
  cancel-in-progress: false  # let the older run finish rather than drop a data point

jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
      - run: pixi run probe
      - name: Commit and push CSV update
        run: |
          git config user.name "fire-perimeter-probe"
          git config user.email "fire-perimeter-probe[bot]@users.noreply.github.com"
          git add data/probe-results.csv
          git diff --staged --quiet || git commit -m "probe: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin HEAD
